
# Configuración de Firebase App Hosting optimizada para producción
runConfig:
  maxInstances: 10
  minInstances: 0
  memory: 512Mi
  cpu: 1

# Variables de entorno para el despliegue oficial
env:
  - name: NODE_ENV
    value: production
  - name: NEXT_PUBLIC_SITE_URL
    value: https://certifind.intellecto.com.co
